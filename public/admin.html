<!DOCTYPE html>
<html>
<head>
    <title>Metro Cloth Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .order-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Pending Payments</h1>
    <div id="list"></div>

    <script>
        async function loadOrders() {
            const res = await fetch('http://localhost:3000/api/admin/pending');
            const orders = await res.json();
            const container = document.getElementById('list');
            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <p><strong>Customer:</strong> ${o.customer} (${o.phone})</p>
                    <p><strong>Amount:</strong> ₹${o.amount}</p>
                    <p><strong>UTR:</strong> ${o.utr}</p>
                    <button onclick="approve('${o.utr}')">Verify & Approve</button>
                </div>
            `).join('');
        }

        async function approve(utr) {
            await fetch('http://localhost:3000/api/admin/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ utr })
            });
            alert("Payment Approved! User will see success message.");
            loadOrders();
        }

        setInterval(loadOrders, 5000);
        loadOrders();
    </script>
</body>
</html>
