<!DOCTYPE html>
<html>
<head>
    <title>Metro Cloth Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .order-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Pending Payments</h1>
    <div id="list"></div>

    <script>
        async function loadOrders() {
    try {
        const res = await fetch('https://metroclothenterprise.onrender.com/api/admin/pending');
        if (!res.ok) throw new Error("Failed to fetch orders");
        
        const orders = await res.json();
        const container = document.getElementById('list');

        if (orders.length === 0) {
            container.innerHTML = "<p>No pending payments at the moment.</p>";
            return;
        }

        // Added the Reject button to the HTML mapping
        container.innerHTML = orders.map(o => `
            <div class="order-card" style="border-left: 5px solid #4b2e1e; padding: 15px; margin-bottom: 15px; background: #fff;">
                <p><strong>Customer:</strong> ${o.customer} (${o.phone})</p>
                <p><strong>Amount:</strong> ₹${o.amount}</p>
                <p><strong>UTR:</strong> <span style="color: blue; font-weight: bold;">${o.utr}</span></p>
                <div style="margin-top: 10px;">
                    <button onclick="approve('${o.utr}')" style="background: #28a745; margin-right: 10px;">Verify & Approve</button>
                    <button onclick="rejectOrder('${o.utr}')" style="background: #dc3545; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">Reject Payment</button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        console.error("Admin Load Error:", err);
    }
}

async function approve(utr) {
    try {
        const response = await fetch('https://metroclothenterprise.onrender.com/api/admin/approve', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ utr })
        });
        if (response.ok) {
            alert("Payment Approved!");
            loadOrders();
        }
    } catch (err) {
        console.error("Approve Error:", err);
    }
}

// NEW: Function to handle rejection
async function rejectOrder(utr) {
    if (!confirm("Are you sure you want to reject this payment?")) return;

    try {
        const response = await fetch('https://metroclothenterprise.onrender.com/api/admin/reject', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ utr })
        });

        if (response.ok) {
            alert("Order Rejected. The customer will be notified.");
            loadOrders();
        }
    } catch (err) {
        console.error("Reject Error:", err);
    }
}

setInterval(loadOrders, 10000);
loadOrders();
    </script>
</body>
</html>
